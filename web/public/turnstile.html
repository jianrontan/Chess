<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>verification</title>
<!--
  Turnstile host page, two modes:

  IFRAME MODE (Chromium): loaded by the app inside a CREDENTIALLESS iframe so
  the widget's challenge frames escape the main page's COEP (which the
  threaded engine requires). Served WITHOUT COOP/COEP — see _headers.
  Protocol (same-origin postMessage only):
    parent -> here : { type: "turnstile-mint", id }
    here -> parent : { type: "turnstile-ready" } once the widget is rendered
    here -> parent : { type: "turnstile-token", id, token: string | null }

  DETOUR MODE (everything else): opened as a TOP-LEVEL page (no COEP applies
  there, so the widget runs in any browser). Mints one token, trades it at
  /api/verify for a signed clearance cookie, then returns to the app. The
  spend gate accepts that cookie in place of a per-request token.
-->
<script>
  var PROD_SITEKEY = "0x4AAAAAAD38qd1vpULAPPXA";
  var TEST_SITEKEY = "1x00000000000000000000AA"; /* always-pass test key */
  var sitekey =
    location.hostname === "localhost" || location.hostname === "127.0.0.1"
      ? TEST_SITEKEY
      : PROD_SITEKEY;

  var widgetId = null;
  var currentId = null;

  function send(msg) {
    parent.postMessage(msg, location.origin);
  }

  function finish(token) {
    if (currentId !== null) {
      send({ type: "turnstile-token", id: currentId, token: token });
      currentId = null;
    }
  }

  window.addEventListener("message", function (e) {
    if (e.origin !== location.origin) return;
    var d = e.data;
    if (!d || d.type !== "turnstile-mint") return;
    if (widgetId === null || !window.turnstile) {
      send({ type: "turnstile-token", id: d.id, token: null });
      return;
    }
    finish(null); /* a superseded mint resolves null */
    currentId = d.id;
    window.turnstile.reset(widgetId);
    window.turnstile.execute(widgetId);
  });

  var detour = window.parent === window; /* top-level = detour mode */

  function setStatus(text) {
    var el = document.getElementById("status");
    if (el) el.textContent = text;
  }

  function detourComplete(token) {
    if (!token) {
      setStatus("Verification failed. Go back and try again, or use Chrome/Edge.");
      return;
    }
    fetch("/api/verify", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ token: token }),
    })
      .then(function (res) {
        if (!res.ok) throw new Error("verify " + res.status);
        setStatus("Verified — taking you back…");
        window.location.replace("/");
      })
      .catch(function () {
        setStatus("Verification could not be saved. Go back and try again.");
      });
  }

  function onTurnstileLoad() {
    widgetId = window.turnstile.render("#widget", {
      sitekey: sitekey,
      action: "turnstile-spin-v1",
      execution: "execute",
      callback: function (token) {
        if (detour) detourComplete(token);
        else finish(token);
      },
      "error-callback": function () {
        if (detour) detourComplete(null);
        else finish(null);
      },
    });
    if (detour) {
      setStatus("Verifying your browser…");
      window.turnstile.execute(widgetId);
    } else {
      send({ type: "turnstile-ready" });
    }
  }
</script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>
<style>
  body { font-family: system-ui, sans-serif; display: grid; place-items: center; min-height: 90vh; margin: 0; }
  #status { color: #555; font-size: 0.95rem; }
</style>
</head>
<body>
  <div>
    <div id="widget"></div>
    <p id="status"></p>
  </div>
</body>
</html>
